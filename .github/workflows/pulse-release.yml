name: pulse Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  linux_bin: "pulse"
  win_bin: "pulse.exe"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - name: Build for Linux
        run: |
          GOOS=linux GOARCH=amd64 go build -o ${{ env.linux_bin }} .
      - name: Build for Windows
        run: |
          GOOS=windows GOARCH=amd64 go build -o ${{ env.win_bin }} .
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          prerelease: false
          files: |
            ${{ env.linux_bin }}
            ${{ env.win_bin }}
